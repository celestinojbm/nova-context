# Local dev stack for M0: Postgres 16 + pgvector, Redis.
# MinIO and mailpit arrive with their milestones (media storage: M2+, email: M4).
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
