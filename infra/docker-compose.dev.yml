# Local dev stack: Postgres 16 + pgvector, Redis, and (optional) MinIO for
# the M8 media pipeline's s3 store.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: nova
      POSTGRES_PASSWORD: nova
      POSTGRES_DB: nova
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova -d nova"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # M8 (optional): S3-compatible object storage for the media pipeline.
  # Default dev uses NOVA_MEDIA_STORE=fs and does not need this. To exercise
  # the s3 store locally: `docker compose --profile media-s3 up -d minio`,
  # create the bucket in the console (:9001), then set on the API:
  #   NOVA_MEDIA_STORE=s3 NOVA_MEDIA_S3_BUCKET=nova-media
  #   NOVA_MEDIA_S3_ENDPOINT=http://localhost:9000
  #   NOVA_MEDIA_S3_ACCESS_KEY_ID=nova NOVA_MEDIA_S3_SECRET_ACCESS_KEY=nova-minio-secret
  minio:
    image: minio/minio:latest
    profiles: ["media-s3"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nova
      MINIO_ROOT_PASSWORD: nova-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  pgdata:
  minio-data:
